<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🕵️ Таємний агент: Шкільний привид</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- A-Frame + MindAR -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
    </script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #0b0e1a;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        /* ===== SCREENS ===== */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s ease;
            opacity: 0;
            overflow: hidden;
        }
        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* ===== DASHBOARD ===== */
        #dashboard {
            background: radial-gradient(ellipse at 50% 30%, #141b33, #070a12);
            padding: 20px 16px 30px;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .dash-header {
            text-align: center;
            padding: 10px 0 6px;
            width: 100%;
            flex-shrink: 0;
        }
        .dash-header .badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.18);
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 40px;
            padding: 4px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .dash-header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #d4af37, #f5e08a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            line-height: 1.2;
        }
        .dash-header .sub {
            font-size: 14px;
            color: #8896b8;
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        /* progress */
        .progress-wrap {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            height: 8px;
            margin: 12px auto 16px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #f5d76e);
            border-radius: 30px;
            transition: width 0.5s ease;
        }

        /* grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
            margin: 4px 0 12px;
        }

        .loc-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            min-height: 110px;
            position: relative;
            touch-action: manipulation;
        }
        .loc-btn:active {
            transform: scale(0.94);
        }
        .loc-btn .icon {
            font-size: 34px;
            margin-bottom: 4px;
            line-height: 1;
        }
        .loc-btn .name {
            font-size: 13px;
            font-weight: 700;
            color: #c8d0e6;
            text-align: center;
            line-height: 1.2;
        }
        .loc-btn .letter-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #d4af37;
            color: #0b0e1a;
            font-weight: 900;
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            border: 2px solid #0b0e1a;
        }
        .loc-btn .letter-badge.show {
            display: flex;
        }
        .loc-btn.done {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.08);
        }
        .loc-btn.done .name {
            color: #d4af37;
        }

        /* bottom */
        .dash-bottom {
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-top: 6px;
        }

        .decoder-btn {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #0b0e1a;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 24px rgba(212, 175, 55, 0.25);
            touch-action: manipulation;
            letter-spacing: 0.5px;
        }
        .decoder-btn:active {
            transform: scale(0.95);
        }
        .decoder-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: none;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 10px 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: #8896b8;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .reset-btn:active {
            transform: scale(0.94);
        }

        .collected-word {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            min-height: 42px;
            text-align: center;
        }

        /* ===== AR VIEW ===== */
        #arView {
            background: #000;
            padding: 0;
            justify-content: flex-start;
        }

        #arView a-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent;
        }

        .ar-overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px 18px 22px;
        }

        .ar-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }
        .ar-back {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        .ar-back:active {
            transform: scale(0.92);
        }
        .ar-location-name {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.2);
            pointer-events: none;
        }

        .ar-hint {
            text-align: center;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: 30px;
        }
        .ar-hint .label {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            color: #c8d0e6;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: inline-block;
        }
        .ar-hint .label .emoji {
            margin-right: 8px;
        }

        /* AR Quiz Overlay */
        .ar-quiz {
            position: absolute;
            z-index: 25;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 8px;
            background: rgba(11, 14, 26, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px 18px 18px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
        }
        .ar-quiz.show {
            display: flex;
        }
        .ar-quiz .q-text {
            font-size: 16px;
            font-weight: 700;
            color: #e8edf5;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .ar-quiz .q-ghost {
            text-align: center;
            font-size: 28px;
            margin-bottom: 2px;
        }
        .ar-quiz .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .ar-quiz .opt {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            color: #c8d0e6;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            touch-action: manipulation;
        }
        .ar-quiz .opt:active {
            transform: scale(0.96);
        }
        .ar-quiz .opt.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }
        .ar-quiz .opt.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }
        .ar-quiz .opt.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        .ar-letter-reveal {
            position: absolute;
            z-index: 30;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.5), 0 0 120px rgba(212, 175, 55, 0.2);
            pointer-events: none;
            display: none;
            animation: letterPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 40px;
            border: 2px solid rgba(212, 175, 55, 0.3);
        }
        .ar-letter-reveal.show {
            display: flex;
        }
        @keyframes letterPop {
            0% {
                transform: translate(-50%, -50%) scale(0.2) rotate(-20deg);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== DECODER ===== */
        #decoder {
            background: radial-gradient(ellipse at 50% 30%, #141b33, #070a12);
            padding: 24px 20px;
            justify-content: center;
        }

        .decoder-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 28px 22px 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .decoder-box h2 {
            font-size: 24px;
            font-weight: 800;
            color: #d4af37;
            margin-bottom: 4px;
        }
        .decoder-box .sub {
            font-size: 14px;
            color: #8896b8;
            margin-bottom: 18px;
        }

        .decoder-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }
        .decoder-input-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            transition: border 0.2s;
            text-transform: uppercase;
        }
        .decoder-input-row input:focus {
            border-color: #d4af37;
        }
        .decoder-input-row input::placeholder {
            color: #445;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .decoder-input-row button {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 16px;
            padding: 0 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: #0b0e1a;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .decoder-input-row button:active {
            transform: scale(0.94);
        }

        .decoder-result {
            font-size: 18px;
            font-weight: 700;
            min-height: 50px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .decoder-result.success {
            border-color: #2ecc71;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.06);
        }
        .decoder-result.fail {
            border-color: #e74c3c;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.06);
        }
        .decoder-result .big {
            font-size: 36px;
        }

        .decoder-back {
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 12px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            color: #8896b8;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            width: 100%;
            max-width: 200px;
        }
        .decoder-back:active {
            transform: scale(0.94);
        }

        /* ===== SCROLLBAR ===== */
        #dashboard::-webkit-scrollbar {
            width: 3px;
        }
        #dashboard::-webkit-scrollbar-track {
            background: transparent;
        }
        #dashboard::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .dash-header h1 {
                font-size: 22px;
            }
            .grid {
                gap: 8px;
            }
            .loc-btn {
                min-height: 90px;
                padding: 12px 4px 10px;
            }
            .loc-btn .icon {
                font-size: 28px;
            }
            .loc-btn .name {
                font-size: 11px;
            }
            .ar-quiz .q-text {
                font-size: 14px;
            }
            .ar-quiz .opt {
                font-size: 13px;
                padding: 10px 14px;
            }
            .decoder-input-row input {
                font-size: 18px;
                padding: 10px 12px;
            }
            .ar-letter-reveal {
                font-size: 56px;
                padding: 14px 28px;
            }
            .collected-word {
                font-size: 22px;
                letter-spacing: 6px;
            }
        }

        @media (max-width: 380px) {
            .grid {
                gap: 6px;
            }
            .loc-btn {
                min-height: 76px;
                padding: 8px 2px 8px;
                border-radius: 14px;
            }
            .loc-btn .icon {
                font-size: 22px;
            }
            .loc-btn .name {
                font-size: 10px;
            }
            .dash-header h1 {
                font-size: 18px;
            }
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
        .fade-transition {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- SCREEN: DASHBOARD                                            -->
    <!-- ============================================================ -->
    <div id="dashboard" class="screen active">
        <div class="dash-header">
            <div class="badge">🕵️ Місія</div>
            <h1>Таємний агент</h1>
            <div class="sub">Шкільний привид · 6 локацій</div>
        </div>

        <div class="progress-wrap">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="grid" id="locationGrid">
            <!-- generated by JS -->
        </div>

        <div class="dash-bottom">
            <div class="collected-word" id="collectedWord">_ _ _ _ _ _</div>
            <button class="decoder-btn" id="decoderBtn">🔓 Дешифратор</button>
            <button class="reset-btn" id="resetBtn">⟳ Почати заново</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- SCREEN: AR VIEW                                              -->
    <!-- ============================================================ -->
    <div id="arView" class="screen">
        <!-- A-Frame Scene -->
        <a-scene
        mindar-image="imageTargetSrc: ./marker.mind; autoStart: true; uiLoading: no; uiError: no; maxTrack: 1;"
        embedded
        color-space="sRGB"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        id="arScene"
        style="background: transparent;"
        >
        <a-assets>
            <!-- videos will be set by JS -->
            <video id="arVideo" muted playsinline webkit-playsinline preload="auto" loop></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video
            src="#arVideo"
            width="1.7"
            height="3.0"
            position="0 0 0"
            visible="false"
            id="videoEntity"
            >
        </a-video>
    </a-entity>
</a-scene>

<!-- Overlay -->
<div class="ar-overlay">
    <div class="ar-top">
        <button class="ar-back" id="arBackBtn">← Назад</button>
        <span class="ar-location-name" id="arLocationName">📍 Локація</span>
    </div>
    <div class="ar-hint" id="arHint">
        <span class="label"><span class="emoji">📸</span> Наведи камеру на маркер</span>
    </div>
</div>

<!-- Quiz -->
<div class="ar-quiz" id="arQuiz">
    <div class="q-ghost" id="qGhost">👻</div>
    <div class="q-text" id="qText">Питання?</div>
    <div class="options" id="qOptions"></div>
</div>

<!-- Letter Reveal -->
<div class="ar-letter-reveal" id="arLetterReveal">
    <span id="revealLetter">З</span>
</div>
</div>

<!-- ============================================================ -->
<!-- SCREEN: DECODER                                              -->
<!-- ============================================================ -->
<div id="decoder" class="screen">
    <div class="decoder-box">
        <h2>🔐 Дешифратор</h2>
        <div class="sub">Введи зібрані літери, щоб розкрити слово</div>

        <div class="decoder-input-row">
            <input type="text" id="decoderInput" placeholder="З Н А Н Н Я" maxlength="6" autocomplete="off" />
            <button id="decoderCheckBtn">✅</button>
        </div>

        <div class="decoder-result" id="decoderResult">
            <span style="color:#8896b8;">Введи 6 літер</span>
        </div>

        <button class="decoder-back" id="decoderBackBtn">← На головну</button>
    </div>
</div>

<!-- ============================================================ -->
<!-- JAVASCRIPT                                                    -->
<!-- ============================================================ -->

            options: [
                'Чіпси з колою',
                'Каша, фрукти і чай',
                'Тільки цукерки'
            ],
            correct: 1,
            hint: 'На здоров\'я!'
        }, {
            id: 4,
            name: 'Дзеркало',
            icon: '🪞',
            letter: 'Н',
            video: './video5.mp4',
            marker: './marker5.mind',
            ghost: '👻 Двійник',
            question: 'Що відображає дзеркало?',
            options: [
                'Твоє відображення, але ліворуч і праворуч поміняні місцями',
                'Твій характер',
                'Майбутнє'
            ],
            correct: 0,
            hint: 'Віддзеркалення — подвоєння'
        }, {
            id: 5,
            name: 'Навчальний розклад',
            icon: '📅',
            letter: 'Я',
            video: './video6.mp4',
            marker: './marker6.mind',
            ghost: '👻 Хронос',
            question: 'Скільки триває один урок у школі?',
            options: [
                '30 хвилин',
                '45 хвилин',
                '60 хвилин'
            ],
            correct: 1,
            hint: 'Я — учень 5 класу!'
        }];

        const TARGET_WORD = 'ЗНАННЯ';

        // =============================================================
        // STATE
        // =============================================================
        let state = {
            completed: new Array(6).fill(false), // true = letter collected
            letters: new Array(6).fill(''),
            currentLocation: null, // index or null
            quizLocked: false,
            sceneReady: false,
        };

        // =============================================================
        // DOM REFS
        // =============================================================
        const $ = id => document.getElementById(id);
        const dashboard = $('dashboard');
        const arView = $('arView');
        const decoder = $('decoder');
        const grid = $('locationGrid');
        const progressFill = $('progressFill');
        const collectedWord = $('collectedWord');
        const decoderBtn = $('decoderBtn');
        const resetBtn = $('resetBtn');

        const arBackBtn = $('arBackBtn');
        const arLocationName = $('arLocationName');
        const arHint = $('arHint');
        const arQuiz = $('arQuiz');
        const qGhost = $('qGhost');
        const qText = $('qText');
        const qOptions = $('qOptions');
        const arLetterReveal = $('arLetterReveal');
        const revealLetter = $('revealLetter');

        const videoEl = document.getElementById('arVideo');
        const videoEntity = document.getElementById('videoEntity');
        const arScene = document.getElementById('arScene');

        const decoderInput = $('decoderInput');
        const decoderCheckBtn = $('decoderCheckBtn');
        const decoderResult = $('decoderResult');
        const decoderBackBtn = $('decoderBackBtn');

        // =============================================================
        // SCREEN MANAGEMENT
        // =============================================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');
        }

        // =============================================================
        // DASHBOARD
        // =============================================================
        function renderDashboard() {
            const completedCount = state.completed.filter(Boolean).length;
            const pct = Math.round((completedCount / LOCATIONS.length) * 100);
            progressFill.style.width = pct + '%';

            // collected word
            let word = '';
            for (let i = 0; i < LOCATIONS.length; i++) {
                word += state.letters[i] || '_';
            }
            collectedWord.textContent = word.split('').join(' ');

            // buttons
            grid.innerHTML = '';
            LOCATIONS.forEach((loc, idx) => {
                const done = state.completed[idx];
                const btn = document.createElement('div');
                btn.className = 'loc-btn' + (done ? ' done' : '');
                btn.setAttribute('data-index', idx);

                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.textContent = loc.icon;

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = loc.name;

                const badge = document.createElement('div');
                badge.className = 'letter-badge' + (done ? ' show' : '');
                badge.textContent = loc.letter;

                btn.appendChild(icon);
                btn.appendChild(name);
                btn.appendChild(badge);

                btn.addEventListener('click', () => {
                    if (!state.completed[idx]) {
                        openLocation(idx);
                    } else {
                        // already done — maybe show a little feedback?
                        // just re-open? or do nothing? we'll re-open.
                        openLocation(idx);
                    }
                });

                grid.appendChild(btn);
            });

            decoderBtn.disabled = (completedCount < LOCATIONS.length);
        }

        // =============================================================
        // AR VIEW
        // =============================================================
        let arInitialized = false;

        function openLocation(index) {
            state.currentLocation = index;
            const loc = LOCATIONS[index];

            // Show AR screen
            showScreen('arView');

            // Update UI
            arLocationName.textContent = loc.icon + ' ' + loc.name;
            arHint.querySelector('.label').innerHTML = '<span class="emoji">📸</span> Наведи камеру на маркер ' + loc.icon;

            // Reset quiz & letter
            arQuiz.classList.remove('show');
            arLetterReveal.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.style.display = 'none';
            state.quizLocked = false;

            // Set video source
            const videoSrc = loc.video || './video1.mp4';
            videoEl.src = videoSrc;
            videoEl.load();
            videoEl.pause();

            // Set marker — we need to reload the scene with new marker
            // Since MindAR doesn't support runtime marker change easily,
            // we'll use the approach of setting the attribute and reloading.
            // But simpler: we use a single marker for all locations.
            // The marker is just a trigger; content is based on location index.

            // Actually, we'll use the marker.mind file (single marker)
            // and differentiate by location index.
            // So we don't need to change the marker at runtime.

            // Hide video entity initially
            videoEntity.setAttribute('visible', false);

            // Show hint
            arHint.style.display = 'block';

            // Reset video entity visibility
            videoEntity.setAttribute('visible', false);

            // We need to re-initialize the AR scene? No, we just use the same marker.
            // The marker is the same for all locations.
            // When the marker is found, we show the content for the current location.

            // But we need to make sure the scene is ready.
            // The scene should already be running.

            // Re-enable the marker target
            // The scene is already running with the marker.

            // Show the hint
            arHint.style.display = 'block';

            // Make sure quiz is hidden
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';

            // Reset video
            videoEntity.setAttribute('visible', false);

            // The marker detection will trigger the content.
            // We'll listen for targetFound event.

            // If the scene is already ready, we might need to re-trigger.
            // But we'll rely on the event listeners.
        }

        // =============================================================
        // AR EVENT HANDLERS
        // =============================================================
        function setupAREvents() {
            // Target found
            arScene.addEventListener('targetFound', () => {
                console.log('🎯 Маркер знайдено!');
                arHint.style.display = 'none';
                videoEntity.setAttribute('visible', true);

                // Play video
                videoEl.currentTime = 0;
                videoEl.play().catch(e => console.warn('Autoplay failed', e));

                // Show quiz after a delay (let the video play a bit)
                setTimeout(() => {
                    if (state.currentLocation !== null && !state.quizLocked) {
                        showQuizForLocation(state.currentLocation);
                    }
                }, 3000);
            });

            // Target lost
            arScene.addEventListener('targetLost', () => {
                console.log('👋 Маркер втрачено');
                videoEntity.setAttribute('visible', false);
                videoEl.pause();
                arQuiz.classList.remove('show');
                arQuiz.style.display = 'none';
                arHint.style.display = 'block';
                state.quizLocked = false;
            });

            // Video ended
            videoEl.addEventListener('ended', () => {
                console.log('🎬 Відео завершено');
                // If quiz isn't shown yet, show it now
                if (state.currentLocation !== null && !state.quizLocked) {
                    // Check if quiz is already showing
                    if (!arQuiz.classList.contains('show')) {
                        showQuizForLocation(state.currentLocation);
                    }
                }
            });

            // Scene ready
            arScene.addEventListener('renderstart', () => {
                console.log('🚀 AR сцена готова');
                state.sceneReady = true;
            });
        }

        // =============================================================
        // QUIZ
        // =============================================================
        function showQuizForLocation(index) {
            if (state.quizLocked) return;
            if (state.completed[index]) {
                // Already completed, show letter again?
                showLetterReveal(index);
                return;
            }

            const loc = LOCATIONS[index];
            qGhost.textContent = loc.ghost || '👻';
            qText.textContent = loc.question;

            // Options
            qOptions.innerHTML = '';
            loc.options.forEach((opt, oi) => {
                const btn = document.createElement('button');
                btn.className = 'opt';
                btn.textContent = opt;
                btn.dataset.optIndex = oi;
                btn.addEventListener('click', () => handleQuizAnswer(index, oi, btn));
                qOptions.appendChild(btn);
            });

            arQuiz.style.display = 'flex';
            arQuiz.classList.add('show');
            state.quizLocked = false;
        }

        function handleQuizAnswer(locIndex, selectedIndex, btnEl) {
            if (state.quizLocked) return;
            if (state.completed[locIndex]) return;

            const loc = LOCATIONS[locIndex];
            const isCorrect = (selectedIndex === loc.correct);

            // Disable all options
            const allOpts = qOptions.querySelectorAll('.opt');
            allOpts.forEach(o => o.classList.add('disabled'));

            // Highlight correct/wrong
            allOpts.forEach((o, i) => {
                if (i === loc.correct) o.classList.add('correct');
                if (i === selectedIndex && !isCorrect) o.classList.add('wrong');
            });

            state.quizLocked = true;

            if (isCorrect) {
                // ✅ Correct!
                setTimeout(() => {
                    // Hide quiz
                    arQuiz.classList.remove('show');
                    arQuiz.style.display = 'none';

                    // Mark as completed
                    state.completed[locIndex] = true;
                    state.letters[locIndex] = loc.letter;

                    // Show letter reveal
                    showLetterReveal(locIndex);

                    // Update dashboard
                    renderDashboard();
                }, 800);
            } else {
                // ❌ Wrong — allow retry after a moment
                setTimeout(() => {
                    // Re-enable options
                    allOpts.forEach(o => {
                        o.classList.remove('correct', 'wrong', 'disabled');
                    });
                    state.quizLocked = false;
                    // Keep quiz visible
                }, 1200);
            }
        }

        function showLetterReveal(index) {
            const loc = LOCATIONS[index];
            revealLetter.textContent = loc.letter;
            arLetterReveal.style.display = 'flex';
            arLetterReveal.classList.add('show');

            // Auto-hide after 3s
            setTimeout(() => {
                arLetterReveal.classList.remove('show');
                arLetterReveal.style.display = 'none';
            }, 3000);
        }

        // =============================================================
        // DECODER
        // =============================================================
        function openDecoder() {
            showScreen('decoder');
            decoderInput.value = '';
            decoderResult.innerHTML = '<span style="color:#8896b8;">Введи 6 літер</span>';
            decoderResult.className = 'decoder-result';
            decoderInput.focus();
        }

        function checkDecoderWord() {
            const input = decoderInput.value.toUpperCase().trim().replace(/\s/g, '');
            const resultEl = decoderResult;

            if (input.length !== 6) {
                resultEl.className = 'decoder-result fail';
                resultEl.innerHTML = '⚠️ Введи рівно 6 літер';
                return;
            }

            if (input === TARGET_WORD) {
                resultEl.className = 'decoder-result success';
                resultEl.innerHTML = '🎉 <span class="big">ЗНАННЯ</span> 🎉<br>Ти зібрав усі літери! Ти — справжній шкільний герой! 🏆';
                // Play a little celebration
            } else {
                resultEl.className = 'decoder-result fail';
                resultEl.innerHTML = '❌ Слово не збігається. Спробуй ще раз!';
            }
        }

        // =============================================================
        // NAVIGATION
        // =============================================================
        function goToDashboard() {
            // Clean up AR
            videoEntity.setAttribute('visible', false);
            videoEl.pause();
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.classList.remove('show');
            arLetterReveal.style.display = 'none';
            arHint.style.display = 'block';
            state.quizLocked = false;
            state.currentLocation = null;

            showScreen('dashboard');
            renderDashboard();
        }

        function resetGame() {
            if (!confirm('Справді хочеш почати заново? Усі літери будуть скинуті.')) return;
            state.completed = new Array(6).fill(false);
            state.letters = new Array(6).fill('');
            renderDashboard();
            // Also reset AR state
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.classList.remove('show');
            arLetterReveal.style.display = 'none';
            state.quizLocked = false;
        }

        // =============================================================
        // INIT
        // =============================================================
        function init() {
            renderDashboard();

            // Event listeners
            decoderBtn.addEventListener('click', openDecoder);
            resetBtn.addEventListener('click', resetGame);
            arBackBtn.addEventListener('click', goToDashboard);
            decoderBackBtn.addEventListener('click', goToDashboard);
            decoderCheckBtn.addEventListener('click', checkDecoderWord);
            decoderInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkDecoderWord();
            });

            // AR events
            setupAREvents();

            // Handle visibility change — pause video when hidden
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    videoEl.pause();
                }
            });

            // Handle back button on Android
            window.addEventListener('popstate', (e) => {
                if (arView.classList.contains('active')) {
                    goToDashboard();
                } else if (decoder.classList.contains('active')) {
                    goToDashboard();
                }
            });

            // Push initial state
            window.history.pushState({ screen: 'dashboard' }, '');

            // Prevent zoom
            document.addEventListener('gesturestart', (e) => e.preventDefault());

            console.log('🕵️ Таємний агент готовий!');
            console.log('🎯 Шість локацій:');
            LOCATIONS.forEach((l, i) => console.log(`  ${i+1}. ${l.icon} ${l.name} → ${l.letter}`));
            console.log(`🔐 Секретне слово: ${TARGET_WORD}`);
        }

        // Run when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>

</body>
</html>
