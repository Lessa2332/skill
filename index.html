<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🕵️ Таємний агент · Шкільний привид</title>

    <!-- Import Map for THREE.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>

    <!-- MindAR (regular script, provides global MindAR) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js">
    </script>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        /* ===== SCREENS ===== */
        .screen {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.35s ease;
            overflow: hidden;
        }
        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* ===== DASHBOARD ===== */
        #dashboard {
            background: radial-gradient(ellipse at 50% 20%, #141b33, #070a12);
            padding: 18px 16px 24px;
            overflow-y: auto;
            align-items: center;
        }
        .dash-header {
            text-align: center;
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
        }
        .dash-header .badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 40px;
            padding: 4px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .dash-header h1 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #d4af37, #f5e08a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .dash-header .sub {
            font-size: 13px;
            color: #8896b8;
            margin-top: 2px;
        }

        .progress-wrap {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            height: 6px;
            margin: 12px auto 14px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #f5d76e);
            border-radius: 30px;
            transition: width 0.5s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
            margin: 2px 0 12px;
        }
        .loc-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 14px 4px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            min-height: 100px;
            position: relative;
            touch-action: manipulation;
        }
        .loc-btn:active {
            transform: scale(0.94);
        }
        .loc-btn .icon {
            font-size: 30px;
            line-height: 1;
            margin-bottom: 2px;
        }
        .loc-btn .name {
            font-size: 12px;
            font-weight: 700;
            color: #c8d0e6;
            text-align: center;
            line-height: 1.2;
        }
        .loc-btn .letter-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #d4af37;
            color: #0b0e1a;
            font-weight: 900;
            font-size: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            border: 2px solid #0b0e1a;
        }
        .loc-btn .letter-badge.show {
            display: flex;
        }
        .loc-btn.done {
            border-color: rgba(212, 175, 55, 0.25);
            background: rgba(212, 175, 55, 0.07);
        }
        .loc-btn.done .name {
            color: #d4af37;
        }

        .dash-bottom {
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-top: 4px;
        }
        .collected-word {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.12);
            min-height: 38px;
            text-align: center;
        }
        .decoder-btn {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 60px;
            padding: 13px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 17px;
            color: #0b0e1a;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 24px rgba(212, 175, 55, 0.2);
            touch-action: manipulation;
        }
        .decoder-btn:active {
            transform: scale(0.95);
        }
        .decoder-btn:disabled {
            opacity: 0.35;
            transform: none;
            box-shadow: none;
        }
        .reset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 9px 18px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            color: #8896b8;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .reset-btn:active {
            transform: scale(0.94);
        }

        /* ===== AR VIEW ===== */
        #arView {
            background: #000;
            padding: 0;
        }
        #arView canvas#arCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: block;
            pointer-events: none;
        }
        #arView video#arVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            display: none;
        }

        .ar-overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 16px 18px;
        }
        .ar-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
            gap: 8px;
            flex-wrap: wrap;
        }
        .ar-back {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 7px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        .ar-back:active {
            transform: scale(0.92);
        }
        .ar-pause-btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ar-pause-btn:active {
            transform: scale(0.92);
        }
        .ar-pause-btn.paused {
            background: rgba(212, 175, 55, 0.3);
            border-color: #d4af37;
        }
        .ar-location-name {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.15);
            pointer-events: none;
        }
        .ar-hint {
            text-align: center;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: 28px;
        }
        .ar-hint .label {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            color: #c8d0e6;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: inline-block;
        }
        .ar-hint .label .emoji {
            margin-right: 8px;
        }

        /* AR Quiz */
        .ar-quiz {
            position: absolute;
            z-index: 25;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 6px;
            background: rgba(11, 14, 26, 0.94);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 18px 16px 16px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.8);
        }
        .ar-quiz.show {
            display: flex;
        }
        .ar-quiz .q-ghost {
            text-align: center;
            font-size: 26px;
            margin-bottom: 0px;
        }
        .ar-quiz .q-text {
            font-size: 15px;
            font-weight: 700;
            color: #e8edf5;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .ar-quiz .options {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .ar-quiz .opt {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #c8d0e6;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            touch-action: manipulation;
        }
        .ar-quiz .opt:active {
            transform: scale(0.96);
        }
        .ar-quiz .opt.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }
        .ar-quiz .opt.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }
        .ar-quiz .opt.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Letter Reveal */
        .ar-letter-reveal {
            position: absolute;
            z-index: 30;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.4), 0 0 120px rgba(212, 175, 55, 0.15);
            pointer-events: none;
            display: none;
            animation: letterPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            padding: 16px 36px;
            border-radius: 36px;
            border: 2px solid rgba(212, 175, 55, 0.2);
        }
        .ar-letter-reveal.show {
            display: flex;
        }
        @keyframes letterPop {
            0% {
                transform: translate(-50%, -50%) scale(0.2) rotate(-20deg);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== DECODER ===== */
        #decoder {
            background: radial-gradient(ellipse at 50% 30%, #141b33, #070a12);
            padding: 24px 20px;
            justify-content: center;
            align-items: center;
        }
        .decoder-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 26px 20px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .decoder-box h2 {
            font-size: 22px;
            font-weight: 800;
            color: #d4af37;
            margin-bottom: 4px;
        }
        .decoder-box .sub {
            font-size: 13px;
            color: #8896b8;
            margin-bottom: 16px;
        }
        .decoder-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .decoder-input-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: border 0.2s;
            text-transform: uppercase;
        }
        .decoder-input-row input:focus {
            border-color: #d4af37;
        }
        .decoder-input-row input::placeholder {
            color: #445;
            letter-spacing: 2px;
            font-size: 13px;
        }
        .decoder-input-row button {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 14px;
            padding: 0 18px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: #0b0e1a;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .decoder-input-row button:active {
            transform: scale(0.94);
        }
        .decoder-result {
            font-size: 17px;
            font-weight: 700;
            min-height: 46px;
            padding: 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .decoder-result.success {
            border-color: #2ecc71;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.06);
        }
        .decoder-result.fail {
            border-color: #e74c3c;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.06);
        }
        .decoder-result .big {
            font-size: 34px;
        }
        .decoder-back {
            margin-top: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 10px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #8896b8;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            width: 100%;
            max-width: 180px;
        }
        .decoder-back:active {
            transform: scale(0.94);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .dash-header h1 {
                font-size: 21px;
            }
            .grid {
                gap: 7px;
            }
            .loc-btn {
                min-height: 84px;
                padding: 10px 4px 8px;
            }
            .loc-btn .icon {
                font-size: 26px;
            }
            .loc-btn .name {
                font-size: 11px;
            }
            .ar-quiz .q-text {
                font-size: 14px;
            }
            .ar-quiz .opt {
                font-size: 13px;
                padding: 8px 12px;
            }
            .ar-letter-reveal {
                font-size: 54px;
                padding: 12px 24px;
            }
            .collected-word {
                font-size: 22px;
                letter-spacing: 4px;
            }
            .decoder-input-row input {
                font-size: 17px;
                padding: 10px 10px;
                letter-spacing: 3px;
            }
        }
        @media (max-width: 380px) {
            .grid {
                gap: 5px;
            }
            .loc-btn {
                min-height: 72px;
                padding: 8px 2px 6px;
                border-radius: 14px;
            }
            .loc-btn .icon {
                font-size: 22px;
            }
            .loc-btn .name {
                font-size: 10px;
            }
            .dash-header h1 {
                font-size: 18px;
            }
            .ar-letter-reveal {
                font-size: 44px;
                padding: 10px 18px;
            }
        }

        /* ===== SCROLLBAR ===== */
        #dashboard::-webkit-scrollbar {
            width: 3px;
        }
        #dashboard::-webkit-scrollbar-track {
            background: transparent;
        }
        #dashboard::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ================================================================ -->
    <!-- SCREEN: DASHBOARD                                                -->
    <!-- ================================================================ -->
    <div id="dashboard" class="screen active">
        <div class="dash-header">
            <div class="badge">🕵️ Місія</div>
            <h1>Таємний агент</h1>
            <div class="sub">Шкільний привид · 6 локацій</div>
        </div>

        <div class="progress-wrap">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="grid" id="locationGrid"></div>

        <div class="dash-bottom">
            <div class="collected-word" id="collectedWord">_ _ _ _ _ _</div>
            <button class="decoder-btn" id="decoderBtn">🔓 Дешифратор</button>
            <button class="reset-btn" id="resetBtn">⟳ Почати заново</button>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCREEN: AR VIEW                                                  -->
    <!-- ================================================================ -->
    <div id="arView" class="screen">
        <video id="arVideo" playsinline muted preload="auto" style="display:none;"></video>
        <canvas id="arCanvas"></canvas>

        <div class="ar-overlay">
            <div class="ar-top">
                <button class="ar-back" id="arBackBtn">← Назад</button>
                <span class="ar-location-name" id="arLocationName">📍 Локація</span>
                <button class="ar-pause-btn" id="arPauseBtn">⏸</button>
            </div>
            <div class="ar-hint" id="arHint">
                <span class="label"><span class="emoji">📸</span> Наведи камеру на маркер</span>
            </div>
        </div>

        <!-- Quiz -->
        <div class="ar-quiz" id="arQuiz">
            <div class="q-ghost" id="qGhost">👻</div>
            <div class="q-text" id="qText">Питання?</div>
            <div class="options" id="qOptions"></div>
        </div>

        <!-- Letter Reveal -->
        <div class="ar-letter-reveal" id="arLetterReveal">
            <span id="revealLetter">З</span>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCREEN: DECODER                                                  -->
    <!-- ================================================================ -->
    <div id="decoder" class="screen">
        <div class="decoder-box">
            <h2>🔐 Дешифратор</h2>
            <div class="sub">Введи зібрані літери, щоб розкрити слово</div>
            <div class="decoder-input-row">
                <input type="text" id="decoderInput" placeholder="З Н А Н Н Я" maxlength="6" autocomplete="off" />
                <button id="decoderCheckBtn">✅</button>
            </div>
            <div class="decoder-result" id="decoderResult">
                <span style="color:#8896b8;">Введи 6 літер</span>
            </div>
            <button class="decoder-back" id="decoderBackBtn">← На головну</button>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- JAVASCRIPT                                                       -->
    <!-- ================================================================ -->
    <script type="module">
        import * as THREE from 'three';

        // =============================================================
        // DATA
        // =============================================================
        const LOCATIONS = [{

            icon: '🌍',
            letter: 'Н',
            video: './02_geografiya.mp4',
            ghost: '👻 Мандрівник',
            question: 'Який найглибший океан на Землі?',
            options: ['Атлантичний', 'Індійський', 'Тихий'],
            correct: 2,
        }, {
            id: 2,
            name: 'Початкова школа',
            icon: '📚',
            letter: 'А',
            video: './03_pochatkova.mp4',
            ghost: '👻 Дух Абетки',
            question: 'Скільки літер в українській абетці?',
            options: ['33', '26', '36'],
            correct: 0,
        }, {
            id: 3,
            name: 'Їдальня',
            icon: '🍽️',
            letter: 'Н',
            video: './04_yidalnya.mp4',
            ghost: '👻 Кухар-Привид',
            question: 'Що з цього найкорисніший сніданок для школяра?',
            options: ['Чіпси з колою', 'Каша, фрукти і чай', 'Тільки цукерки'],
            correct: 1,
        }, {
            id: 4,
            name: 'Дзеркало',
            icon: '🪞',
            letter: 'Н',
            video: './05_dzerkalo.mp4',
            ghost: '👻 Двійник',
            question: 'Що відображає дзеркало?',
            options: [
                'Відображення (ліворуч/праворуч)',
                'Твій характер',
                'Майбутнє'
            ],
            correct: 0,
        }, {
            id: 5,
            name: 'Навчальний розклад',
            icon: '📅',
            letter: 'Я',
            video: './06_rozklad.mp4',
            ghost: '👻 Хронос',
            question: 'Скільки триває один урок у школі?',
            options: ['30 хвилин', '45 хвилин', '60 хвилин'],
            correct: 1,
        }];

        const TARGET_WORD = 'ЗНАННЯ';
        const STORAGE_KEY = 'school_ghost_agent';

        // =============================================================
        // STATE
        // =============================================================
        const state = {
            completed: new Array(6).fill(false),
            letters: new Array(6).fill(''),
            currentLocation: null, // index or null
            quizLocked: false,
            arPaused: false,
            markerFound: false,
        };

        // =============================================================
        // DOM REFS
        // =============================================================
        const $ = id => document.getElementById(id);
        const dashboard = $('dashboard');
        const arView = $('arView');
        const decoder = $('decoder');
        const grid = $('locationGrid');
        const progressFill = $('progressFill');
        const collectedWord = $('collectedWord');
        const decoderBtn = $('decoderBtn');
        const resetBtn = $('resetBtn');
        const arBackBtn = $('arBackBtn');
        const arPauseBtn = $('arPauseBtn');
        const arLocationName = $('arLocationName');
        const arHint = $('arHint');
        const arQuiz = $('arQuiz');
        const qGhost = $('qGhost');
        const qText = $('qText');
        const qOptions = $('qOptions');
        const arLetterReveal = $('arLetterReveal');
        const revealLetter = $('revealLetter');
        const videoEl = $('arVideo');
        const canvasEl = $('arCanvas');
        const decoderInput = $('decoderInput');
        const decoderCheckBtn = $('decoderCheckBtn');
        const decoderResult = $('decoderResult');
        const decoderBackBtn = $('decoderBackBtn');

        // =============================================================
        // LOCAL STORAGE
        // =============================================================
        function saveGameState() {
            try {
                const data = { completed: state.completed, letters: state.letters, timestamp: Date.now() };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (_) {}
        }

        function loadGameState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (data.completed && data.completed.length === LOCATIONS.length) {
                    state.completed = data.completed;
                    state.letters = data.letters;
                    return true;
                }
            } catch (_) {}
            return false;
        }

        // =============================================================
        // DASHBOARD
        // =============================================================
        function renderDashboard() {
            const completedCount = state.completed.filter(Boolean).length;
            const pct = Math.round((completedCount / LOCATIONS.length) * 100);
            progressFill.style.width = pct + '%';

            let word = '';
            for (let i = 0; i < LOCATIONS.length; i++) {
                word += state.letters[i] || '_';
            }
            collectedWord.textContent = word.split('').join(' ');

            grid.innerHTML = '';
            LOCATIONS.forEach((loc, idx) => {
                const done = state.completed[idx];
                const btn = document.createElement('div');
                btn.className = 'loc-btn' + (done ? ' done' : '');
                btn.dataset.index = idx;

                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.textContent = loc.icon;

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = loc.name;

                const badge = document.createElement('div');
                badge.className = 'letter-badge' + (done ? ' show' : '');
                badge.textContent = loc.letter;

                btn.appendChild(icon);
                btn.appendChild(name);
                btn.appendChild(badge);

                btn.addEventListener('click', () => openLocation(idx));
                grid.appendChild(btn);
            });

            decoderBtn.disabled = (completedCount < LOCATIONS.length);
            saveGameState();
        }

        // =============================================================
        // SCREEN MANAGEMENT
        // =============================================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');
        }

        function goToDashboard() {
            // Pause AR if running
            if (arRunning) pauseAR(true);
            showScreen('dashboard');
            renderDashboard();
            // Hide quiz and letter
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.classList.remove('show');
            arLetterReveal.style.display = 'none';
            state.quizLocked = false;
            state.currentLocation = null;
            // Hide video plane
            if (videoPlane) videoPlane.visible = false;
            if (hologramGroup) hologramGroup.visible = false;
        }

        // =============================================================
        // AR — THREE.JS SETUP
        // =============================================================
        let scene, camera, renderer;
        let videoPlane, hologramGroup;
        let videoTexture;
        let shaderMaterial;
        let arRunning = false;
        let arController = null;
        let animationId = null;
        let videoLoaded = false;

        // Chroma-key shader from the user's code
        const vertexShader = `
            varying vec2 vUv;
            void main(){
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTex;
            uniform float uTime;
            uniform float uPlaying;
            varying vec2 vUv;

            vec3 rgb2hsv(vec3 c){
                vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
                vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
                vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
                float d = q.x - min(q.w, q.y);
                float e = 1e-10;
                return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
            }

            void main(){
                if(uPlaying < 0.5){ discard; }

                vec4 col = texture2D(uTex, vUv);
                vec3 hsv = rgb2hsv(col.rgb);
                float hDeg = hsv.x * 360.0;

                bool isChroma = (hDeg > 80.0 && hDeg < 170.0)
                              && hsv.y > 0.25
                              && hsv.z > 0.10;

                if(isChroma) discard;

                float edgeMask = 1.0;
                if(hDeg > 75.0 && hDeg < 175.0 && hsv.y > 0.15 && hsv.z > 0.08){
                    float blend = smoothstep(0.15, 0.28, hsv.y);
                    edgeMask = 1.0 - blend;
                    if(edgeMask < 0.05) discard;
                }

                float noise = fract(sin(vUv.x*800.0 + vUv.y*600.0 + uTime*10.0) * 43758.5453);
                vec3 fc = mix(col.rgb, vec3(0.15, 0.95, 0.3), 0.32);
                fc += noise * 0.15;
                fc += sin(vUv.y*600.0 + uTime*15.0) * 0.10;

                gl_FragColor = vec4(fc, edgeMask * 0.92);
            }
        `;

        function initARScene() {
            const container = arView;

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 3.2);

            // Scene
            scene = new THREE.Scene();

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: canvasEl,
                alpha: true,
                antialias: false,
            });
            renderer.setClearColor(0x000000, 0);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Video texture
            videoTexture = new THREE.VideoTexture(videoEl);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            // Shader material
            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTex: { value: videoTexture },
                    uTime: { value: 0 },
                    uPlaying: { value: 0 },
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
            });

            // Video plane
            const geo = new THREE.PlaneGeometry(1.1, 0.85);
            videoPlane = new THREE.Mesh(geo, shaderMaterial);
            videoPlane.position.set(0, 0.0, 0);
            videoPlane.visible = false;
            scene.add(videoPlane);

            // Hologram group (for particles)
            hologramGroup = new THREE.Group();
            scene.add(hologramGroup);

            // Particles
            for (let i = 0; i < 20; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.006, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x88ff88, emissiveIntensity: 0.5 })
                );
                p.userData = { angle: (i / 20) * Math.PI * 2, radius: 0.55, speed: 0.3 + Math.random() * 0.5 };
                hologramGroup.add(p);
            }
            hologramGroup.visible = false;

            // Lights for particles
            const light = new THREE.PointLight(0x44ff88, 0.5, 2);
            scene.add(light);

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            arRunning = true;
            animateAR();
        }

        function animateAR() {
            if (!arRunning) return;
            animationId = requestAnimationFrame(animateAR);

            const t = performance.now() / 1000;
            if (shaderMaterial) {
                shaderMaterial.uniforms.uTime.value = t;
                if (videoTexture) videoTexture.needsUpdate = true;
            }

            // Particles
            if (hologramGroup && hologramGroup.visible) {
                hologramGroup.children.forEach(p => {
                    if (p.isMesh) {
                        const a = t * p.userData.speed + p.userData.angle;
                        p.position.set(
                            Math.cos(a) * p.userData.radius,
                            Math.sin(a * 2) * 0.04,
                            Math.sin(a) * p.userData.radius
                        );
                    }
                });
            }

            renderer.render(scene, camera);
        }

        // =============================================================
        // AR — MINDAR
        // =============================================================
        let mindar = null;

        async function startAR() {
            if (mindar) {
                try { await mindar.start(); } catch (_) {}
                return;
            }

            try {
                const MindAR = window.MindAR;
                if (!MindAR) {
                    console.error('MindAR not loaded');
                    return;
                }

                mindar = new MindAR.Image({
                    container: arView,
                    imageTargetSrc: './targets.mind',
                    maxTrack: 1,
                });

                // Start the AR controller
                arController = await mindar.start();

                // Set up camera for THREE.js
                const video = arController.getVideoElement();
                if (video) {
                    // Use the same video element for both MindAR and THREE.js texture
                    const vid = video;
                    // We need to use the video from MindAR for the texture
                    // But MindAR creates its own video element
                    // We'll use it directly
                    videoEl.srcObject = vid.srcObject;
                    // Actually, MindAR uses a hidden video element.
                    // We'll use the video from MindAR's camera.

                    // The MindAR video element is accessible via arController.video
                    // But we need to set up our video element to use the same stream.
                    // Let's use the MindAR video directly.

                    // Get the video element from MindAR
                    const arVideo = arController.video;
                    if (arVideo) {
                        // Use this video for our texture
                        videoEl.srcObject = arVideo.srcObject;
                        videoEl.load();
                        videoEl.play().catch(() => {});
                    }
                }

                // Listen for target found
                mindar.on('targetFound', (event) => {
                    const targetIndex = event.target;
                    console.log(`🎯 Маркер знайдено: index ${targetIndex}`);
                    handleMarkerFound(targetIndex);
                });

                mindar.on('targetLost', () => {
                    console.log('👋 Маркер втрачено');
                    handleMarkerLost();
                });

                // Start the render loop for MindAR
                arController.startRenderLoop(() => {
                    // The render loop is handled by THREE.js
                });

                // Use the arController's video for our texture
                const vid = arController.video;
                if (vid) {
                    // Wait for video to be ready
                    if (vid.readyState >= 2) {
                        videoTexture = new THREE.VideoTexture(vid);
                        videoTexture.minFilter = THREE.LinearFilter;
                        videoTexture.magFilter = THREE.LinearFilter;
                        if (shaderMaterial) {
                            shaderMaterial.uniforms.uTex.value = videoTexture;
                        }
                    } else {
                        vid.addEventListener('loadedmetadata', () => {
                            videoTexture = new THREE.VideoTexture(vid);
                            videoTexture.minFilter = THREE.LinearFilter;
                            videoTexture.magFilter = THREE.LinearFilter;
                            if (shaderMaterial) {
                                shaderMaterial.uniforms.uTex.value = videoTexture;
                            }
                        });
                    }
                }

            } catch (err) {
                console.error('MindAR start error:', err);
            }
        }

        function pauseAR(forcePause) {
            if (!mindar) return;
            if (forcePause || !state.arPaused) {
                try {
                    mindar.pause();
                    state.arPaused = true;
                    arPauseBtn.textContent = '▶';
                    arPauseBtn.classList.add('paused');
                    if (videoEl) videoEl.pause();
                    if (videoPlane) videoPlane.visible = false;
                } catch (_) {}
            } else {
                try {
                    mindar.resume();
                    state.arPaused = false;
                    arPauseBtn.textContent = '⏸';
                    arPauseBtn.classList.remove('paused');
                    if (videoEl) videoEl.play().catch(() => {});
                } catch (_) {}
            }
        }

        function resumeAR() {
            if (state.arPaused && mindar) {
                try {
                    mindar.resume();
                    state.arPaused = false;
                    arPauseBtn.textContent = '⏸';
                    arPauseBtn.classList.remove('paused');
                } catch (_) {}
            }
        }

        // =============================================================
        // AR — MARKER HANDLING
        // =============================================================
        let currentMarkerIndex = null;
        let videoPlayedForMarker = false;

        function handleMarkerFound(index) {
            if (index < 0 || index >= LOCATIONS.length) return;
            if (state.completed[index]) {
                // Already completed, just show a quick flash
                showLetterReveal(index);
                return;
            }

            currentMarkerIndex = index;
            state.currentLocation = index;
            const loc = LOCATIONS[index];

            arLocationName.textContent = loc.icon + ' ' + loc.name;
            arHint.style.display = 'none';

            // Show video plane
            if (videoPlane) {
                // Use the video from MindAR
                const vid = arController ? arController.video : null;
                if (vid && videoTexture) {
                    // We already have the texture
                    videoPlane.visible = true;
                    // Set playing flag
                    if (shaderMaterial) {
                        shaderMaterial.uniforms.uPlaying.value = 1;
                    }
                    // Try to play
                    vid.play().catch(() => {});
                } else {
                    // Fallback: use our video element
                    videoEl.src = loc.video;
                    videoEl.load();
                    videoEl.play().catch(() => {});
                    if (videoPlane) videoPlane.visible = true;
                    if (shaderMaterial) {
                        shaderMaterial.uniforms.uPlaying.value = 1;
                    }
                }
            }

            // Show quiz after video plays a bit
            state.quizLocked = false;
            setTimeout(() => {
                if (state.currentLocation === index && !state.completed[index] && !state.quizLocked) {
                    showQuiz(index);
                }
            }, 2500);

            // Particles
            if (hologramGroup) hologramGroup.visible = true;
            state.markerFound = true;
        }

        function handleMarkerLost() {
            if (videoPlane) videoPlane.visible = false;
            if (hologramGroup) hologramGroup.visible = false;
            if (shaderMaterial) {
                shaderMaterial.uniforms.uPlaying.value = 0;
            }
            state.markerFound = false;
            state.quizLocked = false;
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arHint.style.display = 'block';
            if (videoEl) videoEl.pause();
            state.currentLocation = null;
        }

        // =============================================================
        // QUIZ
        // =============================================================
        function showQuiz(index) {
            if (state.completed[index]) return;
            if (state.quizLocked) return;
            const loc = LOCATIONS[index];

            qGhost.textContent = loc.ghost || '👻';
            qText.textContent = loc.question;

            qOptions.innerHTML = '';
            loc.options.forEach((opt, oi) => {
                const btn = document.createElement('button');
                btn.className = 'opt';
                btn.textContent = opt;
                btn.dataset.optIndex = oi;
                btn.addEventListener('click', () => handleQuizAnswer(index, oi, btn));
                qOptions.appendChild(btn);
            });

            arQuiz.style.display = 'flex';
            arQuiz.classList.add('show');
            state.quizLocked = false;
        }

        function handleQuizAnswer(locIndex, selectedIndex, btnEl) {
            if (state.quizLocked) return;
            if (state.completed[locIndex]) return;

            const loc = LOCATIONS[locIndex];
            const isCorrect = (selectedIndex === loc.correct);

            const allOpts = qOptions.querySelectorAll('.opt');
            allOpts.forEach(o => o.classList.add('disabled'));

            allOpts.forEach((o, i) => {
                if (i === loc.correct) o.classList.add('correct');
                if (i === selectedIndex && !isCorrect) o.classList.add('wrong');
            });

            state.quizLocked = true;

            if (isCorrect) {
                setTimeout(() => {
                    arQuiz.classList.remove('show');
                    arQuiz.style.display = 'none';
                    state.completed[locIndex] = true;
                    state.letters[locIndex] = loc.letter;
                    showLetterReveal(locIndex);
                    renderDashboard();
                    state.quizLocked = false;
                    // Hide video after a moment
                    setTimeout(() => {
                        if (videoPlane) videoPlane.visible = false;
                        if (shaderMaterial) shaderMaterial.uniforms.uPlaying.value = 0;
                    }, 2000);
                }, 700);
            } else {
                setTimeout(() => {
                    allOpts.forEach(o => {
                        o.classList.remove('correct', 'wrong', 'disabled');
                    });
                    state.quizLocked = false;
                }, 1200);
            }
        }

        function showLetterReveal(index) {
            const loc = LOCATIONS[index];
            revealLetter.textContent = loc.letter;
            arLetterReveal.style.display = 'flex';
            arLetterReveal.classList.add('show');
            setTimeout(() => {
                arLetterReveal.classList.remove('show');
                arLetterReveal.style.display = 'none';
            }, 2800);
        }

        // =============================================================
        // OPEN LOCATION
        // =============================================================
        let arInitialized = false;

        async function openLocation(index) {
            // If already in AR view, just update
            if (arView.classList.contains('active')) {
                // If marker is already found, we need to reset
                handleMarkerLost();
                // Wait a bit then show hint
                setTimeout(() => {
                    arHint.style.display = 'block';
                    arLocationName.textContent = LOCATIONS[index].icon + ' ' + LOCATIONS[index].name;
                }, 100);
                return;
            }

            showScreen('arView');
            arLocationName.textContent = LOCATIONS[index].icon + ' ' + LOCATIONS[index].name;
            arHint.style.display = 'block';
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.classList.remove('show');
            arLetterReveal.style.display = 'none';
            state.quizLocked = false;
            state.currentLocation = index;

            // Initialize AR if not done
            if (!arInitialized) {
                initARScene();
                arInitialized = true;
                // Start MindAR
                await startAR();
            } else {
                // Resume if paused
                if (state.arPaused) {
                    resumeAR();
                }
                // Reset state
                if (videoPlane) videoPlane.visible = false;
                if (shaderMaterial) shaderMaterial.uniforms.uPlaying.value = 0;
                state.markerFound = false;
            }

            // The marker detection will trigger the content
        }

        // =============================================================
        // DECODER
        // =============================================================
        function openDecoder() {
            // Pause AR
            if (arRunning && state.arPaused === false) {
                pauseAR(true);
            }
            showScreen('decoder');
            decoderInput.value = '';
            decoderResult.innerHTML = '<span style="color:#8896b8;">Введи 6 літер</span>';
            decoderResult.className = 'decoder-result';
            decoderInput.focus();
        }

        function checkDecoderWord() {
            const input = decoderInput.value.toUpperCase().trim().replace(/\s/g, '');
            const resultEl = decoderResult;

            if (input.length !== 6) {
                resultEl.className = 'decoder-result fail';
                resultEl.innerHTML = '⚠️ Введи рівно 6 літер';
                return;
            }

            // Check if all letters are collected
            const allCollected = state.completed.every(v => v === true);
            if (!allCollected) {
                resultEl.className = 'decoder-result fail';
                resultEl.innerHTML = '🔒 Збери всі 6 літер спочатку!';
                return;
            }

            if (input === TARGET_WORD) {
                resultEl.className = 'decoder-result success';
                resultEl.innerHTML =
                '🎉 <span class="big">ЗНАННЯ</span> 🎉<br>Ти зібрав усі літери! Ти — справжній шкільний герой! 🏆';
            } else {
                resultEl.className = 'decoder-result fail';
                resultEl.innerHTML = '❌ Слово не збігається. Спробуй ще раз!';
            }
        }

        // =============================================================
        // RESET
        // =============================================================
        function resetGame() {
            if (!confirm('Справді хочеш почати заново? Усі літери будуть скинуті.')) return;
            state.completed = new Array(6).fill(false);
            state.letters = new Array(6).fill('');
            localStorage.removeItem(STORAGE_KEY);
            renderDashboard();
            // Reset AR state
            arQuiz.classList.remove('show');
            arQuiz.style.display = 'none';
            arLetterReveal.classList.remove('show');
            arLetterReveal.style.display = 'none';
            state.quizLocked = false;
            if (videoPlane) videoPlane.visible = false;
            if (shaderMaterial) shaderMaterial.uniforms.uPlaying.value = 0;
            if (hologramGroup) hologramGroup.visible = false;
            state.markerFound = false;
        }

        // =============================================================
        // VISIBILITY CHANGE (alarm, break)
        // =============================================================
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // App minimized - save and pause
                saveGameState();
                if (arView.classList.contains('active') && arRunning) {
                    pauseAR(true);
                }
            } else {
                // App restored
                renderDashboard();
                if (arView.classList.contains('active') && state.arPaused) {
                    // Don't auto-resume, let user press play
                    arPauseBtn.textContent = '▶';
                    arPauseBtn.classList.add('paused');
                }
            }
        });

        // =============================================================
        // EVENT BINDING
        // =============================================================
        decoderBtn.addEventListener('click', openDecoder);
        resetBtn.addEventListener('click', resetGame);
        arBackBtn.addEventListener('click', goToDashboard);
        decoderBackBtn.addEventListener('click', goToDashboard);

        arPauseBtn.addEventListener('click', () => {
            if (arRunning) {
                pauseAR();
            }
        });

        decoderCheckBtn.addEventListener('click', checkDecoderWord);
        decoderInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkDecoderWord();
            // Auto-uppercase
            setTimeout(() => {
                decoderInput.value = decoderInput.value.toUpperCase();
            }, 10);
        });

        // Prevent zoom
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        // =============================================================
        // INIT
        // =============================================================
        function init() {
            // Load saved state
            const loaded = loadGameState();
            renderDashboard();

            // Initialize AR scene but don't start camera until needed
            // We'll init on first openLocation

            console.log('🕵️ Таємний агент готовий!');
            console.log('🎯 6 локацій з маркерами 01-06');
            console.log(`🔐 Секретне слово: ${TARGET_WORD}`);
            console.log('💾 Прогрес зберігається автоматично');

            // Preload videos
            LOCATIONS.forEach(loc => {
                const v = document.createElement('video');
                v.src = loc.video;
                v.preload = 'metadata';
                v.muted = true;
                v.load();
            });
        }

        // Run init
        init();

        // =============================================================
        // EXPOSE for debugging
        // =============================================================
        window.__state = state;
        window.__reset = resetGame;
        window.__save = saveGameState;

        console.log('✅ Готово!');
    </script>
